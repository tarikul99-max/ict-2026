<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Masterclass - Learn & Quiz</title>
    <style>
        :root {
            --neon: #dfff4f;
            --blue: #38bdf8;
            --bg: #0b1120;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', 'SolaimanLipi', sans-serif;
            background: var(--bg);
            color: #e2e8f0;
            line-height: 1.6;
        }

        /* Sidebar Tree Layout */
        .sidebar {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100vh;
            background: rgba(24, 36, 65, 0.98); backdrop-filter: blur(15px);
            z-index: 1001; padding: 20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border); overflow-y: auto;
        }
        .sidebar.open { left: 0; }

        .class-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .class-selector button {
            flex: 1; padding: 12px; background: var(--glass); border: 1px solid var(--border);
            color: white; border-radius: 12px; cursor: pointer; font-weight: bold;
        }
        .class-selector button.active { background: var(--neon); color: black; border-color: var(--neon); }

        .chapter-tree { border-left: 2px dashed var(--neon); padding-left: 15px; margin-left: 10px; }
        .chap-item {
            display: block; padding: 10px 15px; margin-bottom: 8px; background: var(--glass);
            border: 1px solid var(--border); color: white; border-radius: 8px;
            cursor: pointer; font-size: 14px; transition: 0.3s;
        }
        .chap-item.active { background: rgba(223, 255, 79, 0.1); border-color: var(--neon); color: var(--neon); }

        /* Navigation */
        .top-nav {
            display: flex; justify-content: center; gap: 15px; padding: 20px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .nav-btn {
            padding: 10px 25px; background: var(--glass); border-radius: 50px;
            border: 1px solid var(--border); color: white; cursor: pointer; transition: 0.3s;
        }
        .nav-btn.active { background: var(--neon); color: black; font-weight: bold; }

        .main-container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 24px; padding: 35px;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .status-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--blue);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            color: var(--blue);
            font-weight: bold;
        }

        .code-box {
            background: #1e293b; padding: 20px; border-radius: 12px;
            color: #4ade80; font-family: 'Consolas', monospace;
            border-left: 5px solid var(--neon); margin: 20px 0; overflow-x: auto;
        }

        .mcq-box {
            background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 15px;
            margin-bottom: 15px; border: 1px solid var(--border);
        }
        .menu-trigger {
            position: fixed; bottom: 30px; left: 30px; z-index: 1002;
            padding: 15px 25px; background: var(--neon); color: black;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .badge { background: var(--blue); color: black; padding: 2px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .res-msg { margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <button class="menu-trigger" onclick="toggleSidebar()">☰ অধ্যায় নির্বাচন</button>

    <aside class="sidebar" id="sidebar">
        <div class="class-selector">
            <button id="SSC-tab" class="active" onclick="switchClass('SSC')">SSC</button>
            <button id="HSC-tab" onclick="switchClass('HSC')">HSC</button>
        </div>
        <h3 style="color: var(--neon); margin-left: 10px;">📚 টপিক তালিকা</h3>
        <div class="chapter-tree" id="chapter-list"></div>
    </aside>

    <main class="main-container">
        <nav class="top-nav">
            <button class="nav-btn active" id="btn-home" onclick="setMode('home')">🏠 হোম</button>
            <button class="nav-btn" id="btn-শিট" onclick="setMode('শিট')">📖 লেকচার শিট</button>
            <button class="nav-btn" id="btn-MCQ" onclick="setMode('MCQ')">⚡ কুইজ</button>
        </nav>

        <div id="display-content"></div> 
    </main>

    const contentDatabase = {

        lecture: [

            {
                type: "topic",
                topic: "১. বিশ্বগ্রাম (Global Village)",
                description: `
                <div style="background: rgba(78, 205, 196, 0.05); padding: 15px; border-radius: 10px; border-left: 5px solid #4ecdc4;">
                    বিশ্বগ্রাম হলো এমন একটি সামাজিক বা সাংস্কৃতিক ব্যবস্থা, যেখানে পৃথিবীর সকল প্রান্তের মানুষ একটি একক কমিউনিটির মতো বসবাস করে এবং তথ্য ও যোগাযোগ প্রযুক্তির মাধ্যমে একে অপরের সাথে যোগাযোগ ও সেবা আদান-প্রদান করে।

            /* বক্স ২: জ্ঞানমূলক প্রশ্ন ও উত্তর (১-১৫ অক্ষুণ্ণ) */

            { type: "qna", q: "৩. ক্রায়োসার্জারি (Cryosurgery) কী?", a: "শরীরের অস্বাভাবিক বা রোগাক্রান্ত টিস্যু অত্যন্ত শীতল তাপমাত্রা প্রয়োগ করে ধ্বংস করা হয়।" },

    <img src="https://d8it4huxumps7.cloudfront.net/bites/wp-content/banners/2023/9/64f6e8cb43190_object-oriented_programming_understanding_the_basics.jpg?d=1200x800" alt="OOP Concept" style="width:100%; max-width:500px; display:block; margin:auto;">
    <div style="line-height: 1.8; color: #e0e0e0; text-align: justify;">
        
        <h2 style="color: #4ecdc4;">১. Structure: Class এবং Object (গঠন)</h2>
        <p>যেকোনো OOP প্রোগ্রামের ভিত্তি হলো Class এবং Object। এটি হলো প্রোগ্রামের প্রথম অংশ যেখানে আমরা ডেটার ডিজাইন তৈরি করি।</p>
        
        <div style="background: rgba(78, 205, 196, 0.1); padding: 20px; border-radius: 12px; margin: 15px 0; border-left: 5px solid #4ecdc4;">
            <p><b>Class:</b> এটি একটি নকশা বা ব্লুপ্রিন্ট। এতে বলা থাকে একটি জিনিসের কী কী বৈশিষ্ট্য থাকবে। যেমন: Student একটি ক্লাস হলে তার বৈশিষ্ট্য হতে পারে Name, ID, এবং Department।</p>
            <p><b>Object:</b> এটি ক্লাসের বাস্তব রূপ। যখন আমরা ক্লাস থেকে কোনো মেমরি তৈরি করি, তখন সেটি অবজেক্ট। যেমন: "করিম" একজন Student ক্লাসের অবজেক্ট।</p>
        </div>
        

        <h2 style="color: #ff6b6b; margin-top: 35px;">২. Data Security: Encapsulation এবং Abstraction (সুরক্ষা)</h2>
        <p>প্রোগ্রামিংয়ের এই অংশটি নিশ্চিত করে যে আপনার ডেটা কতটা নিরাপদ থাকবে এবং ইউজার কতটুকু দেখতে পাবে।</p>
        
        <div style="background: rgba(255, 107, 107, 0.1); padding: 20px; border-radius: 12px; margin: 15px 0; border-left: 5px solid #ff6b6b;">
            <p><b>Encapsulation:</b> এটি ডেটা (Variables) এবং মেথডকে (Functions) একটি ক্যাপসুলের মতো ক্লাসের ভেতরে আটকে রাখে। বাইরের কেউ চাইলেই সরাসরি ডেটা পরিবর্তন করতে পারে না। এটি মূলত ডেটা হাইডিং (Data Hiding)-এর কাজ করে।</p>
            
            <p style="margin-top: 15px;"><b>Abstraction:</b> এটি অপ্রয়োজনীয় জটিলতা লুকিয়ে শুধু প্রয়োজনীয় ফিচারটুকু ইউজারকে দেখায়। যেমন: আপনি এটিএম বুথ থেকে টাকা তুলছেন, কিন্তু পেছনের সার্ভার কীভাবে কাজ করছে তা আপনার জানার প্রয়োজন নেই।</p>
            
        </div>

        <h2 style="color: #ffd43b; margin-top: 35px;">৩. Flexibility & Reusability: Inheritance এবং Polymorphism (প্রসার ও আচরণ)</h2>
        <p>এই অংশটি কোডকে বারবার ব্যবহারের সুযোগ করে দেয় এবং কোডকে অনেক বেশি ফ্লেক্সিবল বা নমনীয় করে তোলে।</p>
        
        <div style="background: rgba(255, 212, 59, 0.1); padding: 20px; border-radius: 12px; margin: 15px 0; border-left: 5px solid #ffd43b;">
            <p><b>Inheritance:</b> এটি একটি ক্লাস থেকে অন্য একটি ক্লাসে বৈশিষ্ট্য কপি করার সুযোগ দেয়। এতে বারবার একই কোড লিখতে হয় না। যেমন: Animal ক্লাস থেকে Dog ক্লাস তৈরি করা। Dog অটোমেটিক Animal-এর সব গুণাবলী পাবে।</p>
            
            <p style="margin-top: 15px;"><b>Polymorphism:</b> এর মানে হলো "বহুরূপিতা"। একই নামের ফাংশন ভিন্ন ভিন্ন পরিস্থিতিতে ভিন্ন ভিন্ন কাজ করে। যেমন: একটি Shape ক্লাসের ভেতর area() মেথড আছে। এটি বৃত্তের জন্য একরকম কাজ করবে আর চতুর্ভুজের জন্য অন্যরকম।</p>
            
        </div>

    function updateUI() {
        const display = document.getElementById('display-content');
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById('btn-' + currentMode);
        if(activeBtn) activeBtn.classList.add('active');

        if (currentMode === 'home') {
            const chapterObj = syllabusData[currentClass].find(c => c.id === currentChapter);
            display.innerHTML = `
                <div class="glass-card" style="text-align: center;">
                    <h1 style="color: var(--neon); font-size: 2.5rem;">ICT MasterNote 2026</h1>
                    <p>আইসিটি শেখার সবচেয়ে সহজ এবং আধুনিক ড্যাশবোর্ড।</p>
                    
                    <div class="status-badge">
                        📍 বর্তমানে আপনি আছেন: <br>
                        <span style="color: white; font-size: 1.2rem;">${currentClass} - অধ্যায় ${currentChapter}: ${chapterObj ? chapterObj.title : ""}</span>
                    </div>

                    <div class="code-box">উন্মুক্ত প্রাঙ্গণে চোখ বন্ধ হোক, এক নতুন প্রভাতের আশায়</div>
                </div>`;
        } else if (currentMode === 'শিট') {
            const chapter = syllabusData[currentClass].find(c => c.id === currentChapter);
            const data = contentDatabase[currentClass]?.[currentChapter];
            display.innerHTML = `
                <div class="glass-card">
                    <span class="badge">${currentClass} ICT Masterclass</span>
                    <h2 style="color:var(--neon)">অধ্যায় ${currentChapter}: ${chapter ? chapter.title : ""}</h2>
                    <div class="lecture-content">${data ? data.lecture : "এই লেকচারটি শীঘ্রই আসছে।"}</div>
                </div>`;
        } else if (currentMode === 'MCQ') {
            const data = contentDatabase[currentClass]?.[currentChapter];
            let html = `<div class="glass-card"><h2 style="color:var(--neon)">⚡ কুইজ: অধ্যায় ${currentChapter}</h2>`;
            if (data?.mcqs) {
                data.mcqs.forEach((m, i) => {
                    html += `
                    <div class="mcq-box" id="qbox-${i}">
                        <p><b>প্রশ্ন ${i+1}:</b> ${m.q}</p>
                        <label><input type="radio" name="q${i}" value="a"> ক) ${m.a}</label><br>
                        <label><input type="radio" name="q${i}" value="b"> খ) ${m.b}</label><br>
                        <label><input type="radio" name="q${i}" value="c"> গ) ${m.c}</label><br>
                        <label><input type="radio" name="q${i}" value="d"> ঘ) ${m.d}</label>
                        <div class="res-msg" id="msg-${i}"></div>
                    </div>`;
                });
                html += `<button class="nav-btn active" style="width:100%" onclick="checkAnswers()">সাবমিট করুন</button>`;
            } else { html += "<p>কুইজ পাওয়া যায়নি।</p>"; }
            html += `</div>`;
            display.innerHTML = html;
        }
    }

    function checkAnswers() {
        const data = contentDatabase[currentClass]?.[currentChapter];
        if(!data) return;
        data.mcqs.forEach((m, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const msg = document.getElementById(`msg-${i}`);
            const box = document.getElementById(`qbox-${i}`);
            msg.style.display = "block";
            if(selected?.value === m.ans) {
                msg.innerHTML = "✅ সঠিক উত্তর!"; msg.style.color = "#4ade80"; box.style.borderColor = "#4ade80";
            } else {
                msg.innerHTML = "❌ ভুল উত্তর! সঠিক: " + m.ans.toUpperCase(); msg.style.color = "#ff6b6b"; box.style.borderColor = "#ff6b6b";
            }
        });
    }

    function switchClass(cls) {
        currentClass = cls;
        currentChapter = 1;
        document.querySelectorAll('.class-selector button').forEach(b => b.classList.remove('active'));
        document.getElementById(cls + '-tab').classList.add('active');
        renderChapters();
        updateUI();
    }

    function renderChapters() {
        const list = document.getElementById('chapter-list');
        list.innerHTML = syllabusData[currentClass].map(ch => `
            <div class="chap-item ${currentChapter === ch.id ? 'active' : ''}" 
                 onclick="loadChapter(${ch.id})">${ch.id}. ${ch.title}</div>
        `).join('');
    }

    function loadChapter(id) {
        currentChapter = id;
        renderChapters();
        updateUI();
        closeSidebar();
    }

    function setMode(mode) {
        currentMode = mode;
        updateUI();
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

    renderChapters();
    updateUI();
</script>
